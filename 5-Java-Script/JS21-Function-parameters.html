<html>
    <head>
        <title>JavaScript Functions</title>
        <script>
            function addition(a,b) {
                var sum = a+b;
                return sum;
            }
            d = addition(1,2);
            document.write("d value : ",d);
        </script>
    </head>
    <body>
        <h2>JavaScript function Parameters with return.</h2>
    </body>
</html>

<html>
    <head>
        <title>JavaScript functions</title>
        <script>
            function mouseOver() {
                window.document.write("Hello")
            }
        </script>
    </head>
    <body>
        <p>Bring Your Mouse Inside</p>
          <div onmouseover="mouseOver()">
          <h2>This is inside the div tag</h2>
          </div>
    </body>
</html>

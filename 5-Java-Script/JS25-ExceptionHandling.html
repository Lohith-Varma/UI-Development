<html>
    <head>
        <title>JavaScript Functions</title>
        <script>
            function divide(a,b) {
                try {
                    console.log("One");
                    if(b == 0) {
                        throw new Error("Divide by zero is not allowed..Hello")
                    }
                    let result = a/b;
                    console.log(result);
                    console.log("End");
                    //close try block
                }
                catch(error) {
                    console.log("Program is Error : "+error)
                }
            }
            divide(10,0);
        </script>
    </head>
    <body>
        JavaScript Function Parameters
    </body>
</html>

<html>

        <title>JavaScript Programming</title>

    <body>
        <h1>JavaScript.. For loop</h1>
        <script>
            document.write("<br> for Loop <br>");
            for(var i=1;i<=10;i++) {
                document.write("<br> ",i);
            }   
        </script>
    </body>

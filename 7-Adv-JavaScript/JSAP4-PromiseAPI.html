<html>
    <head>
        <title>Java script Programming</title>
        <script>
            function delay(ms) {
                return new Promise(function (resolve) {
                    setTimeout(resolve, ms);
                });
            }
            async function runDemo() {
                await delay(1000);
                console.log("Lohith");
                await delay(1000);
                console.log("Varma (from await delay)");
                await delay(1000);
                console.log("Lohith");  //This will come after Lohith
            }
            runDemo();            
        </script>
    </head>
    <body>
        <h1>JavaScript..</h1>
    </body>
</html>

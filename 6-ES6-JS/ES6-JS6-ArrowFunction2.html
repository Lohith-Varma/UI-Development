<html>
    <head>
        <title>JavaScript functions</title>
        <script>
            function addition(a,b) {
                return sum = a+b;
            }
            console.log(addition(2,3)); //output is : 5
            //Arrow function
            addition2 = (a,b) => {
                var c = a+b;
                console.log("Hello Arrow addition : ",c);
            }
            addition2(10,20);

            addition3 = (a,b) => console.log("Hello Arrow Addition Hello : ",a+b);
            addition3(10,2);
        </script>
    </head>
    <body>
        <h2>JavaScript function parameters</h2>
    </body>
</html>

<html>
    <head>
        <title>ES6 Programming</title>
    </head>
    <body>
        <h1>JavaScript. Classes</h1>
        <script>
            //BMW
            var brand;
            class Car {
                //BMW
                constructor(name) {
                    this.brand = name;
                } //constructor close
                display() {
                    document.write("<br> This is my car : "+this.brand);
                }
            } //class close

            var mycar = new Car("BMW");
            document.write("<br> My Car is : "+mycar.brand);
            mycar.display();
        </script>
    </body>
</html>

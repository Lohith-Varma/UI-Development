<html>
    <head>
        <title>JavaScript functions</title>
        <script>
            // With out Arrow function
            function myfunction() {
                document.write("This function is Executed...<br>")
            }
            myfunction();
            // Arrow Function
            myfunction1 = () => {
                document.write("This is Arrow function Executed...<br>")
            }
            myfunction1();
            myfunction2 = () => document.write("This is Arrow function..<br>")
            myfunction2();
        </script>
    </head>
    <body>
        <h2>JavaScript Functions</h2>
    </body>
</html>

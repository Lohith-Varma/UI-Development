<html>
    <head>
        <title>ES6 Programming</title>
    </head>
    <body>
        <h1>JavaScript. Classes</h1>
        <script>
            class Person {
                name;  //Lohith
                age;  //20
                
                display() {
                    console.log("Name: "+this.name);
                    console.log("Age: "+this.age);
                } //display() class
            } //Class close
            
            var myperson = new Person();
            myperson.name = "Lohith";
            myperson.age = "20";
            myperson.display();
        </script>
    </body>
</html>

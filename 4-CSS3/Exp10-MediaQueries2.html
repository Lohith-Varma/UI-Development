<html>
    <head>
        <title>CSS3</title>
        <style>
            body {
                background-color: rgb(244, 92, 22);
            }
            /* Smart Phone */
            @media screen and (min-width:550px) {
                body{
                    background-color: rgb(56, 219, 18);
                }
            }
            /* Tablet, iPad */
            @media screen and (min-width:768px) and (max-width:1024px) {
                body{
                    background-color: brown;
                }
            }
            /* Desktops and Laptops */
            @media screen and (min-width:1224px) {
                body{
                    background-color: rgb(237, 229, 6);
                }
            }
            /* Large Screens */
            @media screen and (min-width:1824px) {
                body{
                    background-color: rgb(38, 217, 10);
                }
            }
        </style>
    </head>
    <body>
        <h1>CSS Web Technologies</h1>
        <h2>Lorem ipsum dolor sit amet consectetur adipisicing 
            elit. Id magnam, minima facere non accusantium 
            eveniet at officia recusandae animi exercitationem 
            quas aperiam repellat, rem necessitatibus hic totam, 
            assumenda in ipsa!</h2>
    </body>
</html>
